<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-label="Stylized illustration showing a diverse group of people and a church building with sunrise">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b2545" />
      <stop offset="45%" stop-color="#0b5a6a" />
      <stop offset="100%" stop-color="#0ca08c" />
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b" />
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- sunrise removed -->

  <!-- Distant hills -->
  <g fill="#072033" opacity="0.65">
    <path d="M0 1400 C500 1100 900 1250 1400 1100 C1900 950 2400 1200 3000 1000 C3400 880 3840 1100 3840 1100 L3840 2160 L0 2160 Z" />
  </g>

  <!-- Foreground hill -->
  <path d="M0 1500 C900 1000 1800 1200 2600 950 C3200 760 3840 1050 3840 1050 L3840 2160 L0 2160 Z" fill="#04313a" />

  <!-- Stylized church building (center-left) -->
  <g transform="translate(980,720) scale(1.1)">
    <rect x="-60" y="160" width="420" height="260" rx="18" fill="#0f2b3a" opacity="0.95" />
    <polygon points="150,20 0,160 300,160" fill="#0e2a37" />
    <rect x="120" y="220" width="80" height="120" rx="10" fill="#0ca08c" />
    <rect x="40" y="220" width="60" height="80" rx="8" fill="#0e5870" />
    <rect x="260" y="220" width="60" height="80" rx="8" fill="#0e5870" />
    <rect x="-20" y="220" width="60" height="80" rx="8" fill="#0e5870" />
    <path d="M150 280 L150 220" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.7" />
  </g>

  <!-- Group of diverse simplified people silhouettes (right of center) -->
  <g transform="translate(2100,1060) scale(1.2)" fill="#ffffff" opacity="0.95">
    <!-- Person 1 -->
    <g transform="translate(-300,0)">
      <circle cx="0" cy="-90" r="36" fill="#fff" opacity="0.98" />
      <rect x="-48" y="-40" width="96" height="120" rx="18" fill="#fff" />
    </g>
    <!-- Person 2 -->
    <g transform="translate(-150,20)">
      <circle cx="0" cy="-90" r="34" />
      <rect x="-44" y="-36" width="88" height="104" rx="18" />
    </g>
    <!-- Person 3 -->
    <g transform="translate(30,-10)">
      <circle cx="0" cy="-90" r="40" />
      <rect x="-52" y="-44" width="104" height="136" rx="20" />
    </g>
    <!-- Person 4 -->
    <g transform="translate(210,10)">
      <circle cx="0" cy="-88" r="32" />
      <rect x="-40" y="-36" width="80" height="112" rx="16" />
    </g>
  </g>

  <!-- Foreground accents / path -->
  <path d="M0 1700 C800 1500 1600 1700 2400 1500 C3200 1300 3840 1600 3840 1600 L3840 2160 L0 2160 Z" fill="rgba(0,0,0,0.12)" />

  <!-- Subtle vignette -->
  <rect width="100%" height="100%" fill="black" opacity="0.08" />

</svg>
