<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="RCCG Solution Ground — a warm, family-oriented church in Gravesend, Kent. Service times, ministries, events, and contact information." />
  <link rel="icon" href="img/Solution ground LOGO.avif" />
  <title>Solution Ground | Page not found</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    /* Simple overrides so the 404 looks polished even if styles.css is missing */
    .error-hero{display:flex;align-items:center;justify-content:center;min-height:60vh;padding:48px 16px;gap:28px}
    .error-card{max-width:880px;background:#fff;border-radius:14px;box-shadow:0 12px 30px rgba(2,6,23,0.08);padding:32px;display:flex;gap:24px;align-items:center}
    .error-visual{flex:1;min-width:240px}
    .error-copy{flex:1}
    .error-title{font-size:28px;color:var(--accent,#0b3a66);margin:0 0 8px}
    .error-desc{color:var(--muted,#6b7280);margin:0 0 18px}
    .error-actions{display:flex;gap:12px}
    .btn{display:inline-block;padding:10px 18px;border-radius:999px;border:1px solid #111;background:#fff;color:#111;text-decoration:none}
    .btn-primary{background:var(--accent,#0b3a66);color:#fff;border-color:transparent}
    @media(max-width:760px){.error-card{flex-direction:column;text-align:center}.error-visual{order:-1}}
  </style>
</head>
<body>
  <header style="padding:18px 24px;text-align:left">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:12px;text-decoration:none;color:inherit">
      <img src="img/Solution ground LOGO.avif" alt="RCCG Solution Ground" style="width:42px;height:42px;object-fit:contain;border-radius:6px" loading="lazy">
      <span style="font-weight:700;font-size:18px">RCCG Solution Ground</span>
    </a>
  </header>

  <main class="error-hero">
    <div class="error-card">
      <div class="error-visual">
        <!-- decorative illustration (use existing images) -->
        <img src="img/welcome 11223.avif" alt="Welcome" style="width:100%;border-radius:8px;display:block" loading="lazy">
      </div>
      <div class="error-copy">
        <h1 class="error-title">404 — Page not found</h1>
        <p class="error-desc">Sorry, we couldn't find the page you're looking for. It may have moved or the link could be broken.</p>

        <div class="error-actions">
          <a class="btn btn-primary" href="/index.html">Back to Home</a>
          <button id="btn-back" class="btn" type="button">Go to previous page</button>
        </div>

        <p style="margin-top:14px;color:#8b8f98;font-size:0.95rem">If you believe this is an error, please contact the site administrator.</p>
      </div>
    </div>
  </main>

  <script>
    (function(){
      const back = document.getElementById('btn-back');
      // If there is a valid history session, go back, otherwise go home.
      back.addEventListener('click', function(){
        try {
          if (document.referrer && document.referrer.indexOf(location.origin) === 0) {
            history.back();
          } else if (history.length > 1) {
            history.back();
          } else {
            location.href = '/index.html';
          }
        } catch (e) { location.href = '/index.html'; }
      });
    })();
  </script>
    <!-- Mobile floating bottom navigation (mobile-only) -->
    <nav class="mobile-bottom-nav" aria-label="Primary" role="navigation">
        <div class="mbn-container">
            <a class="mbn-item mbn-home active" href="index.html" data-tab="home" aria-label="Home">
                <!-- Home icon (line style) -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M3 10.5L12 4l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V10.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <a class="mbn-item" href="ministries.html" aria-label="Ministries" data-tab="ministries">
                <!-- Praying hands icon (keeps same size/line weight) -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 2c0 3-3 6-4 8-1 2-1 4 0 6l4 6 4-6c1-2 1-4 0-6-1-2-4-5-4-8z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M8 8s1 2 2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M16 8s-1 2-2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </a>

            <a class="mbn-item" href="location.html" aria-label="Location" data-tab="location">
                <!-- Location icon -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="9" r="2.2" stroke="currentColor" stroke-width="1.4"/>
                </svg>
            </a>

            <a class="mbn-item" href="contact.html" aria-label="Contact" data-tab="contact">
                <!-- Phone icon (outline, matching size/weight) -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c.3.1 1.1.27 1.8.27a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h2.5a1 1 0 0 1 1 1c0 .6.17 1.3.27 1.8a1 1 0 0 1-.24 1.01l-2.2 2.2z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </div>

        <!-- Floating action button (opens chat) - chatbot avatar -->
        <button class="mbn-fab" aria-label="Open chat" title="Open chat">
            <!-- Use same avatar glyph as desktop chat-toggle for visual consistency -->
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <circle class="fab-bg" cx="32" cy="32" r="30" />
                <rect class="fab-face" x="14" y="20" width="36" height="28" rx="6" />
                <circle class="fab-eye" cx="24" cy="32" r="3" />
                <circle class="fab-eye" cx="40" cy="32" r="3" />
                <path class="fab-mouth" d="M26 40c2 2 10 2 12 0" stroke-width="2" stroke-linecap="round" fill="none" />
            </svg>
        </button>
    </nav>

    <!-- Chatbot toggle (bottom-left) -->
    <button id="chat-toggle" class="chat-toggle" aria-label="Open SG Assistant" title="SG Assistant">
      <svg width="34" height="34" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <circle cx="32" cy="32" r="30" fill="#1e73ff" />
        <rect x="14" y="20" width="36" height="28" rx="6" fill="#fff" />
        <circle cx="24" cy="32" r="3" fill="#1e73ff" />
        <circle cx="40" cy="32" r="3" fill="#1e73ff" />
        <path d="M26 40c2 2 10 2 12 0" stroke="#1e73ff" stroke-width="2" stroke-linecap="round" fill="none" />
      </svg>
    </button>

    <!-- Chat window (hidden by default) -->
    <aside id="chat-window" class="chat-window" aria-hidden="true" role="dialog" aria-label="SG Assistant">
      <header class="chat-header">
        <div class="chat-title">
          <svg width="22" height="22" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
            <circle cx="32" cy="32" r="30" fill="#1e73ff" />
            <rect x="14" y="20" width="36" height="28" rx="6" fill="#fff" />
          </svg>
          <strong>SG Assistant</strong>
        </div>
        <button id="chat-close" class="chat-close" aria-label="Close chat">✕</button>
      </header>
      <div id="chat-messages" class="chat-messages" aria-live="polite"></div>

      <form id="chat-form" class="chat-form" autocomplete="off">
        <input id="chat-input" class="chat-input" type="text" placeholder="Ask about this website (location, serving, ministries)..." />
        <button type="submit" class="chat-send">Send</button>
      </form>
    </aside>
</body>
</html>
